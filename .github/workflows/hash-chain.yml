name: Hash Chain

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Compute verify hash 4f32741d
        id: compute_hash
        run: |
          HASH=$(echo -n "${{ secrets.MY_SECRET }}github-verified" | sha256sum | awk '{print $1}' | cut -c1-10)
          echo "verify_hash=$HASH" >> $GITHUB_OUTPUT
          echo "$HASH" > verify.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: verify-hash-4f32741d
          path: verify.txt
